<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chat with AI personas of Anshuman Singh, Abhimanyu Saxena, and Kshitij Mishra — Scaler Academy mentors. Built for GenAI Prompt Engineering.">
    <title>Persona Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="app-header">
            <div class="header-left">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                </div>
                <div>
                    <h1>Persona Chatbot</h1>
                    <p class="header-subtitle">Persona Chatbot - GenAI project</p>
                </div>
            </div>
            <div class="active-persona-badge" id="active-persona-badge">
                <img id="badge-avatar" src="assets/anshuman.png" alt="Active persona avatar" width="28" height="28">
                <span id="badge-name">Anshuman Singh</span>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Persona Switcher -->
            <nav id="persona-switcher" aria-label="Select a persona to chat with">
                <button class="persona-card active" data-persona="anshuman" id="btn-anshuman" onclick="switchPersona('anshuman')">
                    <img src="assets/anshuman.png" alt="Anshuman Singh" class="persona-avatar" width="52" height="52">
                    <div class="persona-info">
                        <span class="persona-name">Anshuman Singh</span>
                        <span class="persona-title">The Visionary Coach</span>
                    </div>
                    <div class="active-indicator"></div>
                </button>
                <button class="persona-card" data-persona="abhimanyu" id="btn-abhimanyu" onclick="switchPersona('abhimanyu')">
                    <img src="assets/abhimanyu.png" alt="Abhimanyu Saxena" class="persona-avatar" width="52" height="52">
                    <div class="persona-info">
                        <span class="persona-name">Abhimanyu Saxena</span>
                        <span class="persona-title">The Strategic Architect</span>
                    </div>
                    <div class="active-indicator"></div>
                </button>
                <button class="persona-card" data-persona="kshitij" id="btn-kshitij" onclick="switchPersona('kshitij')">
                    <img src="assets/kshitij.png" alt="Kshitij Mishra" class="persona-avatar" width="52" height="52">
                    <div class="persona-info">
                        <span class="persona-name">Kshitij Mishra</span>
                        <span class="persona-title">The Clinical Mastermind</span>
                    </div>
                    <div class="active-indicator"></div>
                </button>
            </nav>

            <!-- Chat Area -->
            <section id="chat-container">
                <!-- Welcome message -->
                <div id="welcome-screen">
                    <div class="welcome-avatar-ring" id="welcome-avatar-ring">
                        <img id="welcome-avatar" src="assets/anshuman.png" alt="Persona avatar" width="80" height="80">
                    </div>
                    <h2 id="welcome-name">Anshuman Singh</h2>
                    <p id="welcome-title">The Visionary Coach</p>
                    <p class="welcome-hint">Pick a question below or type your own to start chatting.</p>
                </div>

                <!-- Messages -->
                <div id="messages-container"></div>

                <!-- Typing Indicator -->
                <div id="typing-indicator" class="typing-indicator hidden">
                    <img id="typing-avatar" src="assets/anshuman.png" alt="Typing" class="typing-avatar-img" width="28" height="28">
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Section: Suggestions + Input -->
        <footer id="bottom-section">
            <!-- Suggestion Chips -->
            <div id="suggestion-chips" class="suggestion-chips">
                <!-- Chips are populated by JS -->
            </div>

            <!-- Input Area -->
            <form id="input-form" onsubmit="handleSubmit(event)">
                <div class="input-wrapper">
                    <textarea
                        id="message-input"
                        placeholder="Ask something..."
                        rows="1"
                        aria-label="Type your message"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                    <button type="submit" id="send-btn" aria-label="Send message" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </form>
        </footer>

        <!-- Error Toast -->
        <div id="error-toast" class="error-toast hidden">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <span id="error-toast-message">Something went wrong.</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
